name: Trento Installation Tests

on:
  workflow_dispatch:
    inputs:
      install_rolling:
        description: 'Install rolling version of packages'
        type: boolean
        default: false
      run_cypress:
        description: 'Run Cypress test suite'
        type: boolean
        default: true

concurrency:
  group: trento-installation-tests
  cancel-in-progress: false

env:
  AZURE_BLOB_STORAGE: ${{ vars.AZURE_BLOB_STORAGE }}
  AZURE_BLOB_STORAGE_CONTAINER: ${{ vars.AZURE_BLOB_STORAGE_CONTAINER }}
  AZURE_BLOB_STORAGE_TF_STATE_CONTAINER: ${{ vars.AZURE_BLOB_STORAGE_TF_STATE_CONTAINER }}
  SSH_USERNAME: cloudadmin

jobs:
  provision-and-deploy:
    name: Provision infrastructure & deploy Trento
    runs-on: ubuntu-24.04

    outputs:
      target_hosts_json: ${{ steps.get-hosts.outputs.target_hosts_json }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate machines config CSV
        uses: ./.github/actions/generate-machines-config
        with:
          os_versions: ${{ vars.SUPPORTED_OS_VERSIONS }}

      - name: Setup SSH keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_SSH_KEY_CONTENT }}" > ~/.ssh/id_rsa
          echo "${{ vars.PUBLIC_SSH_KEY_CONTENT }}" > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa
          chmod 644 ~/.ssh/id_rsa.pub

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Extract Azure Credentials
        id: azure-creds
        uses: ./.github/actions/extract-azure-credentials
        with:
          azure_credentials: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Parse tool versions
        uses: endorama/asdf-parse-tool-versions@0ccedac6b6ae060388ab9f0ba4473a61afc21a57 # v1.5.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        id: fmt
        working-directory: ./terraform
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ env.AZURE_BLOB_STORAGE }}" \
            -backend-config="container_name=${{ env.AZURE_BLOB_STORAGE_TF_STATE_CONTAINER }}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="resource_group_name=${{ vars.AZURE_RESOURCE_GROUP }}" \
            -backend-config="client_id=${{ steps.azure-creds.outputs.client_id }}" \
            -backend-config="client_secret=${{ steps.azure-creds.outputs.client_secret }}" \
            -backend-config="tenant_id=${{ steps.azure-creds.outputs.tenant_id }}" \
            -backend-config="subscription_id=${{ steps.azure-creds.outputs.subscription_id }}"

      - name: Terraform Validate
        id: validate
        working-directory: ./terraform
        run: terraform validate -no-color

      - name: Set ARM_SUBSCRIPTION_ID
        id: subscription
        run: |
          ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          if [ -z "$ARM_SUBSCRIPTION_ID" ]; then
            echo "Error: Could not retrieve subscription ID from Azure CLI"
            exit 1
          fi
          echo "ARM_SUBSCRIPTION_ID=$ARM_SUBSCRIPTION_ID" >> $GITHUB_ENV
          echo "Subscription ID set successfully"

      - name: Terraform Destroy
        working-directory: ./terraform
        run: terraform destroy -auto-approve -input=false
        env:
          TF_VAR_azure_resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}
          TF_VAR_azure_owner_tag: ${{ vars.AZURE_OWNER_TAG }}
          TF_VAR_ssh_public_key_content: ${{ vars.PUBLIC_SSH_KEY_CONTENT }}
          TF_VAR_ssh_private_key_content: ""

      - name: Terraform Plan
        id: plan
        working-directory: ./terraform
        run: terraform plan -no-color -out=tfplan -input=false
        env:
          TF_VAR_azure_resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}
          TF_VAR_azure_owner_tag: ${{ vars.AZURE_OWNER_TAG }}
          TF_VAR_ssh_public_key_content: ${{ vars.PUBLIC_SSH_KEY_CONTENT }}
          TF_VAR_ssh_private_key_content: ${{ secrets.PRIVATE_SSH_KEY_CONTENT }}

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_ssh_private_key_content: ${{ secrets.PRIVATE_SSH_KEY_CONTENT }}

      - name: Get machine hosts from CSV
        id: get-hosts
        uses: ./.github/actions/get-machine-hosts
        with:
          csv_file: .machines.conf.csv
          azure_resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}

      - name: Register SUSE machines & activate modules
        id: activate-modules
        uses: ./.github/actions/suse-register-and-activate-modules
        with:
          hosts_fqdn_csv: ${{ steps.get-hosts.outputs.hosts_fqdn_csv }}
          ssh_username: ${{ env.SSH_USERNAME }}
          ssh_private_key: ${{ secrets.PRIVATE_SSH_KEY_CONTENT }}
          registration_code: ${{ secrets.SUSE_REGISTRATION_CODE }}
          registration_email: ${{ secrets.SUSE_REGISTRATION_EMAIL }}

      - name: Setup RPM repository on machines
        id: setup-rpm-repo
        uses: ./.github/actions/setup-rpm-repository
        with:
          hosts_fqdn_csv: ${{ steps.get-hosts.outputs.hosts_fqdn_csv }}
          ssh_username: ${{ env.SSH_USERNAME }}
          ssh_private_key: ${{ secrets.PRIVATE_SSH_KEY_CONTENT }}
          azure_blob_storage: ${{ env.AZURE_BLOB_STORAGE }}
          azure_blob_storage_container: ${{ env.AZURE_BLOB_STORAGE_CONTAINER }}
          azure_blob_storage_sas_token: ${{ secrets.AZURE_BLOB_STORAGE_SAS_TOKEN }}
          install_rolling: ${{ inputs.install_rolling }}

      - name: Setup test CA
        id: setup-test-ca
        uses: ./.github/actions/setup-test-ca
        with:
          hosts_fqdn_csv: ${{ steps.get-hosts.outputs.hosts_fqdn_csv }}
          ssh_username: ${{ env.SSH_USERNAME }}
          ca_cert: ${{ vars.TRENTO_TEST_CA_CRT }}
          ca_key: ${{ secrets.TRENTO_TEST_CA_KEY }}

      - name: Generate Certs & Ansible inventory
        id: ansible-playbook-preparations
        uses: ./.github/actions/ansible-playbook-preparations
        with:
          hosts_fqdn_csv: ${{ steps.get-hosts.outputs.hosts_fqdn_csv }}
          ssh_username: ${{ env.SSH_USERNAME }}
          ssh_private_key: ${{ secrets.PRIVATE_SSH_KEY_CONTENT }}
          web_admin_password: ${{ secrets.WEB_ADMIN_PASSWORD }}

      - name: Run Ansible Trento playbook
        uses: ./.github/actions/run-ansible-trento-playbook
        with:
          hosts_fqdn_csv: ${{ steps.get-hosts.outputs.hosts_fqdn_csv }}
          ssh_username: ${{ env.SSH_USERNAME }}
          ssh_private_key: ${{ secrets.PRIVATE_SSH_KEY_CONTENT }}

      - name: Trust test CA certificate on target hosts
        uses: appleboy/ssh-action@823bd89e131d8d508129f9443cad5855e9ba96f0 # v1.2.4
        with:
          host: ${{ join(fromJson(steps.get-hosts.outputs.target_hosts_json), ',') }}
          username: ${{ env.SSH_USERNAME }}
          key: ${{ secrets.PRIVATE_SSH_KEY_CONTENT }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            CA_CERT_PATH="/etc/pki/trust/anchors/trento-ca.crt"
            NGINX_CERT_PATH="/etc/ssl/certs/trento.crt"
            PRESERVED_CERT_DIR="/etc/trento/certs"
            PRESERVED_CERT_PATH="${PRESERVED_CERT_DIR}/trento.crt"

            sudo install -d -m 0755 /etc/pki/trust/anchors "$PRESERVED_CERT_DIR"

            if sudo test -f "$NGINX_CERT_PATH" && ! sudo test -L "$NGINX_CERT_PATH"; then
              sudo mv -f "$NGINX_CERT_PATH" "$PRESERVED_CERT_PATH"
            fi

            sudo tee "$CA_CERT_PATH" > /dev/null <<'EOF_CA_CRT'
            ${{ vars.TRENTO_TEST_CA_CRT }}
            EOF_CA_CRT
            sudo update-ca-certificates

            if sudo test -f "$PRESERVED_CERT_PATH"; then
              sudo ln -sfn "$PRESERVED_CERT_PATH" "$NGINX_CERT_PATH"
            fi

      - name: Trust test CA certificate
        run: |
          sudo mkdir -p /usr/local/share/ca-certificates/
          sudo cp "${{ steps.setup-test-ca.outputs.ca_cert_path }}" /usr/local/share/ca-certificates/trento-ca.crt
          sudo update-ca-certificates

      - name: Verify Trento instances healthcheck endpoints
        uses: ./.github/actions/verify-trento-health
        with:
          hosts_fqdn_csv: ${{ steps.get-hosts.outputs.hosts_fqdn_csv }}

      - name: Verify Trento supportconfig plugin on target nodes
        uses: appleboy/ssh-action@823bd89e131d8d508129f9443cad5855e9ba96f0 # v1.2.4
        with:
          host: ${{ join(fromJson(steps.get-hosts.outputs.target_hosts_json), ',') }}
          username: ${{ env.SSH_USERNAME }}
          key: ${{ secrets.PRIVATE_SSH_KEY_CONTENT }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            NODE_NAME="$(hostname -s)"

            # Skip supportutils-plugin verification on SLES 15.4
            if [[ "$NODE_NAME" == *"15sp4"* ]]; then
              echo "Skipping supportutils-plugin verification on SLES 15.4 (${NODE_NAME})"
              exit 0
            fi

            sudo rpm -q supportutils-plugin-trento supportutils > /dev/null

            OUTPUT_FILE="$(mktemp)"
            trap 'rm -f "$OUTPUT_FILE"' EXIT
            sudo supportconfig > "$OUTPUT_FILE"

            if ! grep -Eq "Plugin: trento\.\.\.\s+Done" "$OUTPUT_FILE"; then
              echo "ERROR: Trento supportconfig plugin not found/executed on ${NODE_NAME}" >&2
              exit 1
            fi

  test:
    name: Run Cypress tests (${{ matrix.target_host }})
    needs: provision-and-deploy
    if: ${{ inputs.run_cypress }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target_host: ${{ fromJson(needs.provision-and-deploy.outputs.target_hosts_json) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout Trento Web tests
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: trento-project/web
          path: trento-web

      - name: Trust test CA certificate
        run: |
          set -euo pipefail
          CA_CERT_FILE="/usr/local/share/ca-certificates/trento-ca.crt"
          sudo mkdir -p /usr/local/share/ca-certificates/
          sudo tee "$CA_CERT_FILE" > /dev/null <<'EOF_CA_CRT'
          ${{ vars.TRENTO_TEST_CA_CRT }}
          EOF_CA_CRT
          openssl x509 -in "$CA_CERT_FILE" -noout > /dev/null
          sudo update-ca-certificates
          echo "NODE_EXTRA_CA_CERTS=$CA_CERT_FILE" >> "$GITHUB_ENV"

      - name: Install photofinish
        uses: jaxxstorm/action-install-gh-release@6096f2a2bbfee498ced520b6922ac2c06e990ed2 # v2.1.0
        with:
          repo: trento-project/photofinish
          tag: v1.4.2
          cache: enable
          chmod: 0755
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install web assets dependencies
        run: cd trento-web/assets && npm ci

      # The installation phase deploys a real agent; stop it before Cypress generates photofinish data to avoid conflicts during tests execution.
      - name: Stop Trento agent on target host
        uses: ./.github/actions/stop-trento-agent
        with:
          target_host_fqdn: ${{ matrix.target_host }}
          ssh_username: ${{ env.SSH_USERNAME }}
          ssh_private_key: ${{ secrets.PRIVATE_SSH_KEY_CONTENT }}

      - name: Cypress run
        uses: cypress-io/github-action@f790eee7a50d9505912f50c2095510be7de06aa7 # v6
        env:
          cypress_video: false
          cypress_photofinish_binary: $(whereis photofinish | cut -d" " -f2)
          cypress_wanda_mode: 'prod'
          cypress_web_mode: 'prod'
        with:
          working-directory: trento-web/test/e2e
          wait-on-timeout: 30
          config: baseUrl=https://${{ matrix.target_host }},retries=2

      - name: Upload cypress test screenshots
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: e2e-screenshots-${{ matrix.target_host }}
          path: trento-web/test/e2e/cypress/screenshots/
          retention-days: 1
