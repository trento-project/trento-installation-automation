name: 'Verify Trento Supportutils Plugin'
description: 'Verify supportutils-plugin-trento on target machines'

inputs:
  target_hosts_fqdn_csv:
    description: 'Comma-separated list of target machine FQDNs'
    required: true
  ssh_username:
    description: 'SSH username'
    required: true
  ssh_private_key:
    description: 'SSH private key content'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Verify Trento supportconfig plugin on target nodes
      uses: appleboy/ssh-action@823bd89e131d8d508129f9443cad5855e9ba96f0 # v1.2.4
      with:
        host: ${{ inputs.target_hosts_fqdn_csv }}
        username: ${{ inputs.ssh_username }}
        key: ${{ inputs.ssh_private_key }}
        command_timeout: 30m
        script: |
          set -euo pipefail

          NODE_NAME="$(hostname -s)"
          source /etc/os-release
          if [ "${VERSION_ID}" = "15.4" ]; then
            echo "Skipping supportutils plugin verification on ${NODE_NAME}: not expected for SLES ${VERSION_ID}"
            exit 0
          fi

          sudo rpm -q supportutils-plugin-trento supportutils > /dev/null

          OUTPUT_FILE="$(mktemp)"
          trap 'rm -f "$OUTPUT_FILE"' EXIT
          sudo supportconfig > "$OUTPUT_FILE"

          if ! grep -Eq "Plugin: trento\.\.\.\s+Done" "$OUTPUT_FILE"; then
            echo "ERROR: Trento supportconfig plugin not found/executed on ${NODE_NAME}" >&2
            exit 1
          fi
