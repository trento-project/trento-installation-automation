name: 'Ansible Playbook Preparations'
description: 'Prepare control nodes for Ansible playbook execution (SSH keys, SSL certs, inventory generation)'

inputs:
  hosts_fqdn_csv:
    description: 'Comma-separated list of machine FQDNs'
    required: true
  ssh_username:
    description: 'SSH username'
    required: true
  ssh_private_key:
    description: 'SSH private key content'
    required: true
  web_admin_password:
    description: 'Trento web admin password'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Generate Ansible inventory on control nodes
      uses: appleboy/ssh-action@823bd89e131d8d508129f9443cad5855e9ba96f0 # v1.2.4
      env:
        SSH_USERNAME: ${{ inputs.ssh_username }}
        SSH_PRIVATE_KEY: ${{ inputs.ssh_private_key }}
        WEB_ADMIN_PASSWORD: ${{ inputs.web_admin_password }}
      with:
        host: ${{ inputs.hosts_fqdn_csv }}
        username: ${{ inputs.ssh_username }}
        key: ${{ inputs.ssh_private_key }}
        envs: SSH_USERNAME,SSH_PRIVATE_KEY,WEB_ADMIN_PASSWORD
        script: |
          set -e

          # Get current hostname (short name, e.g., control15sp6rpm)
          CURRENT_HOSTNAME=$(hostname -s)

          # Only run on control nodes
          if [[ "$CURRENT_HOSTNAME" != *control* ]]; then
            exit 0
          fi

          # Construct Azure public FQDN from short hostname
          AZURE_REGION="westeurope"
          CURRENT_FQDN="${CURRENT_HOSTNAME}.${AZURE_REGION}.cloudapp.azure.com"

          # Derive target FQDN by replacing 'control' with 'target'
          TARGET_FQDN="${CURRENT_FQDN/control/target}"

          # Setup SSH private key for Ansible and for communicating with target nodes
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Add target to known_hosts to avoid interactive prompt
          ssh-keyscan -H "$TARGET_FQDN" >> ~/.ssh/known_hosts 2>/dev/null

          # Generate SSL certificates using a local CA
          CERTS_DIR="$HOME/.ssl"
          mkdir -p "$CERTS_DIR"

          echo "Generating Local CA and signed certificate for $TARGET_FQDN..."
          # 1. Generate CA key and certificate
          openssl genrsa -out "$CERTS_DIR/ca.key" 2048
          openssl req -x509 -new -nodes -key "$CERTS_DIR/ca.key" -sha256 -days 3650 -out "$CERTS_DIR/ca.crt" -subj "/CN=Trento Test CA"

          # 2. Generate Server key and CSR
          openssl genrsa -out "$CERTS_DIR/trento.key" 2048
          openssl req -new -key "$CERTS_DIR/trento.key" -out "$CERTS_DIR/trento.csr" -subj "/CN=$TARGET_FQDN"

          # 3. Sign the Server certificate with the CA
          openssl x509 -req -in "$CERTS_DIR/trento.csr" -CA "$CERTS_DIR/ca.crt" -CAkey "$CERTS_DIR/ca.key" -CAcreateserial \
            -out "$CERTS_DIR/trento.crt" -days 365 -sha256 \
            -extfile <(echo "subjectAltName=DNS:$TARGET_FQDN")

          # 4. Trust the CA on the control node (so tools like photofinish can talk to the target)
          sudo cp "$CERTS_DIR/ca.crt" /usr/share/pki/trust/anchors/trento-test-ca.crt
          sudo update-ca-certificates

          # 5. Install the CA on the target node via SSH
          scp "$CERTS_DIR/ca.crt" "$TARGET_FQDN":/tmp/ca.crt
          ssh "$TARGET_FQDN" "sudo cp /tmp/ca.crt /usr/share/pki/trust/anchors/trento-test-ca.crt && sudo update-ca-certificates && rm /tmp/ca.crt"

          # Create Ansible inventory directory if it doesn't exist
          sudo mkdir -p /etc/ansible

          # Set python interpreter line only for SP4/SP5
          PYTHON_INTERPRETER_LINE=""
          if [[ "$CURRENT_HOSTNAME" == *sp4* || "$CURRENT_HOSTNAME" == *sp5* ]]; then
            PYTHON_INTERPRETER_LINE='ansible_python_interpreter: "/usr/bin/python3"'
          fi

          # Generate the inventory file
          sudo tee /etc/ansible/trento-inventory.yml > /dev/null << EOF
          all:
            children:
              trento_hosts:
                vars:
                  ${PYTHON_INTERPRETER_LINE}
                  provision_prometheus: false
                  provision_proxy: true
                  web_postgres_password: "postgres"
                  wanda_postgres_password: "postgres"
                  rabbitmq_password: "admin"
                  web_admin_password: "$WEB_ADMIN_PASSWORD"
                  trento_web_listen_port: 4000
                  trento_web_listen_port: 4001
                  trento_server_name: "{{ inventory_hostname }}"
                  trento_server_url: "https://{{ inventory_hostname }}"
                  nginx_vhost_filename: "{{ inventory_hostname }}"
                  nginx_ssl_cert: "{{ lookup('file', '$CERTS_DIR/trento.crt') }}"
                  nginx_ssl_key: "{{ lookup('file', '$CERTS_DIR/trento.key') }}"
                hosts:
                  ${TARGET_FQDN}:
                    ansible_user: $SSH_USERNAME
              trento_server:
                children:
                  trento_hosts: {}
              postgres_hosts:
                children:
                  trento_hosts: {}
              rabbitmq_hosts:
                children:
                  trento_hosts: {}
              agents:
                children:
                  trento_hosts: {}
          EOF
