name: 'Report Installed Versions'
description: 'Query installed Trento package versions on all machines and write to job summary'

inputs:
  hosts_fqdn_csv:
    description: 'Comma-separated list of machine FQDNs'
    required: true
  ssh_username:
    description: 'SSH username'
    required: true
  ssh_private_key:
    description: 'SSH private key content'
    required: true
  control_packages:
    description: 'Comma-separated list of packages to check on control nodes'
    required: true
  target_packages:
    description: 'Comma-separated list of packages to check on target nodes'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Query package versions and write job summary
      shell: bash
      run: |
        SSH_KEY_FILE=$(mktemp)
        echo "${{ inputs.ssh_private_key }}" > "$SSH_KEY_FILE"
        chmod 600 "$SSH_KEY_FILE"

        python3 "${{ github.action_path }}/report.py" \
          "${{ inputs.hosts_fqdn_csv }}" \
          "${{ inputs.ssh_username }}" \
          "$SSH_KEY_FILE" \
          "${{ inputs.control_packages }}" \
          "${{ inputs.target_packages }}" \
          >> "$GITHUB_STEP_SUMMARY"

        rm -f "$SSH_KEY_FILE"
