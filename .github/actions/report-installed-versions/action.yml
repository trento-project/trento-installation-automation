name: 'Report Installed Versions'
description: 'Query installed Trento package versions on all machines and write to job summary'

inputs:
  hosts_fqdn_csv:
    description: 'Comma-separated list of machine FQDNs'
    required: true
  ssh_username:
    description: 'SSH username'
    required: true
  ssh_private_key:
    description: 'SSH private key content'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Query package versions and write job summary
      shell: bash
      run: |
        SSH_KEY_FILE=$(mktemp)
        echo "${{ inputs.ssh_private_key }}" > "$SSH_KEY_FILE"
        chmod 600 "$SSH_KEY_FILE"
        SSH_OPTS="-o StrictHostKeyChecking=no -o BatchMode=yes -i $SSH_KEY_FILE"

        ALL_PACKAGES="ansible-trento trento-web trento-wanda trento-checks trento-agent"

        IFS=',' read -ra HOSTS <<< "${{ inputs.hosts_fqdn_csv }}"

        # Collect versions: versions[pkg:host]=version
        declare -A versions
        for host in "${HOSTS[@]}"; do
          for pkg in $ALL_PACKAGES; do
            version=$(ssh $SSH_OPTS "${{ inputs.ssh_username }}@${host}" \
              "rpm -q --queryformat '%{VERSION}-%{RELEASE}' ${pkg} 2>/dev/null || echo '-'")
            versions["${pkg}:${host}"]="$version"
          done
        done

        {
          echo "## Installed Package Versions"
          echo ""

          # Header row
          header="| Package |"
          separator="|---------|"
          for host in "${HOSTS[@]}"; do
            short="${host%%.*}"
            # short is like control15sp4 or target15sp4 → c/t-major.minor
            [[ "$short" =~ ^(control|target)([0-9]+)sp([0-9]+) ]]
            prefix=$([[ "${BASH_REMATCH[1]}" == control ]] && echo "c" || echo "t")
            label="${prefix}-${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            header+=" \`${label}\` |"
            separator+="----|"
          done
          echo "$header"
          echo "$separator"

          # One row per package
          for pkg in $ALL_PACKAGES; do
            row="| \`${pkg}\` |"
            for host in "${HOSTS[@]}"; do
              row+=" \`${versions[${pkg}:${host}]}\` |"
            done
            echo "$row"
          done

          echo ""
        } >> "$GITHUB_STEP_SUMMARY"

        rm -f "$SSH_KEY_FILE"
