name: 'Wait for SSH'
description: 'Wait for SSH to be available on all specified machines'

inputs:
  hosts_fqdn_csv:
    description: 'Comma-separated list of machine FQDNs'
    required: true
  ssh_username:
    description: 'SSH username'
    required: true
  ssh_private_key:
    description: 'SSH private key content'
    required: true
  max_attempts:
    description: 'Maximum number of connection attempts per host'
    required: false
    default: '30'
  wait_seconds:
    description: 'Seconds to wait between attempts'
    required: false
    default: '10'

runs:
  using: 'composite'
  steps:
    - name: Wait for SSH availability
      shell: bash
      run: |
        MAX_ATTEMPTS="${{ inputs.max_attempts }}"
        WAIT_SECONDS="${{ inputs.wait_seconds }}"

        # Setup SSH key
        mkdir -p ~/.ssh
        echo "${{ inputs.ssh_private_key }}" > ~/.ssh/wait_key
        chmod 600 ~/.ssh/wait_key

        IFS=',' read -ra HOSTS <<< "${{ inputs.hosts_fqdn_csv }}"

        for host in "${HOSTS[@]}"; do
          echo "Waiting for SSH on $host..."
          for i in $(seq 1 $MAX_ATTEMPTS); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -o BatchMode=yes \
                 -i ~/.ssh/wait_key "${{ inputs.ssh_username }}@$host" "echo SSH ready" 2>/dev/null; then
              echo "SSH is ready on $host"
              break
            fi
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "ERROR: SSH not ready on $host after $MAX_ATTEMPTS attempts"
              rm -f ~/.ssh/wait_key
              exit 1
            fi
            echo "Attempt $i/$MAX_ATTEMPTS: SSH not ready on $host, waiting ${WAIT_SECONDS}s..."
            sleep "$WAIT_SECONDS"
          done
        done

        rm -f ~/.ssh/wait_key
        echo "All machines are ready"
