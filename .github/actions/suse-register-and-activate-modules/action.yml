name: 'Register SUSE Machines & Activate Modules'
description: 'Register machines with SUSEConnect & activate SUSE modules (basesystem, PackageHub, legacy)'

inputs:
  hosts_fqdn_csv:
    description: 'Comma-separated list of machine FQDNs'
    required: true
  ssh_username:
    description: 'SSH username'
    required: true
  ssh_private_key:
    description: 'SSH private key content'
    required: true
  registration_code:
    description: 'SUSE registration code'
    required: true
  registration_email:
    description: 'SUSE registration email'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Register machines & activate SUSE modules
      uses: appleboy/ssh-action@v1.2.4
      with:
        host: ${{ inputs.hosts_fqdn_csv }}
        username: ${{ inputs.ssh_username }}
        key: ${{ inputs.ssh_private_key }}
        script: |
          set -e
          source /etc/os-release
          sudo SUSEConnect -r '${{ inputs.registration_code }}' -e '${{ inputs.registration_email }}'          
          sudo SUSEConnect -p PackageHub/$VERSION_ID/x86_64