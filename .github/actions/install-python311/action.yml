name: 'Install Python 3.11'
description: 'Install Python 3.11 on target SLES machines (SP4-SP6) via SSH - automatically filters for target machines'

inputs:
  hosts_fqdn_list:
    description: 'Space-separated list of machine FQDNs (will be filtered for target machines only)'
    required: true
  ssh_username:
    description: 'SSH username'
    required: true
  connection_timeout:
    description: 'SSH connection timeout in seconds'
    required: false
    default: '60'

runs:
  using: 'composite'
  steps:
    - name: Install Python 3.11 on machines
      id: install-python311
      shell: bash
      run: |
        HOSTS_FQDN_LIST="${{ inputs.hosts_fqdn_list }}"
        SSH_USERNAME="${{ inputs.ssh_username }}"
        CONNECTION_TIMEOUT="${{ inputs.connection_timeout }}"

        # Set log directory
        LOGS_DIR="logs"

        # Filter for target machines only
        TARGET_HOSTS=""
        for host in $HOSTS_FQDN_LIST; do
          if echo "$host" | grep -q '^target'; then
            TARGET_HOSTS="$TARGET_HOSTS $host"
          fi
        done

        # Trim leading/trailing whitespace
        TARGET_HOSTS=$(echo $TARGET_HOSTS | xargs)

        echo "Filtering target machines from full host list..."
        echo "All hosts: $HOSTS_FQDN_LIST"
        echo "Target hosts for Python 3.11 installation: $TARGET_HOSTS"
        echo ""

        # Check if there are any target hosts
        if [ -z "$TARGET_HOSTS" ]; then
          echo "No target machines found. Skipping Python 3.11 installation."
          exit 0
        fi

        # Use filtered target hosts for installation
        HOSTS_FQDN_LIST="$TARGET_HOSTS"

        # Track parallel jobs
        declare -a PIDS=()
        declare -A PID_TO_HOST=()

        total_hosts=$(echo $HOSTS_FQDN_LIST | wc -w)

        echo "================================================"
        echo "Installing Python 3.11 on $total_hosts machines in parallel"
        echo "================================================"
        echo ""

        # Launch Python 3.11 installation for each host in parallel
        for host in $HOSTS_FQDN_LIST; do
          log_file="$LOGS_DIR/python311-install-$host.log"

          echo "Launching Python 3.11 installation for $host..."

          # Run Python 3.11 installation via SSH in background
          (
            # Detect SLES version from hostname
            if echo "$host" | grep -q 'sles16'; then
              echo "Detected SLES 16 - skipping Python 3.11 installation (not applicable)"
              echo ""
              echo "=== VERIFICATION: Python Installation ==="
              echo "SLES 16 detected - Python 3.11 installation not required"
              echo "=== END VERIFICATION ==="
              exit 0
            fi

            # Detect Service Pack version from hostname
            SP_VERSION=$(echo "$host" | grep -o 'sp[0-9]*' | cut -c3-)

            if [ -z "$SP_VERSION" ]; then
              echo "Error: Could not detect SP version from hostname: $host" >&2
              exit 1
            fi

            echo "Detected Service Pack version: $SP_VERSION"

            # Install Python 3.11 only for SP versions <= 6
            if [ "$SP_VERSION" -le 6 ]; then
              echo "Installing python311-base..."

              # First attempt
              if ssh -o StrictHostKeyChecking=accept-new \
                  -o ConnectTimeout="$CONNECTION_TIMEOUT" \
                  -i ~/.ssh/id_rsa \
                  "$SSH_USERNAME@$host" \
                  "sudo zypper --non-interactive --gpg-auto-import-keys install --auto-agree-with-licenses python311-base"; then
                echo "✓ Python 3.11 installed successfully"
              else
                # Retry after 5 seconds
                echo "First attempt failed, retrying in 5 seconds..."
                sleep 5

                if ssh -o StrictHostKeyChecking=accept-new \
                    -o ConnectTimeout="$CONNECTION_TIMEOUT" \
                    -i ~/.ssh/id_rsa \
                    "$SSH_USERNAME@$host" \
                    "sudo zypper --non-interactive --gpg-auto-import-keys install --auto-agree-with-licenses python311-base"; then
                  echo "✓ Python 3.11 installed successfully on retry"
                else
                  echo "⚠️  Python 3.11 installation failed after retry"
                  exit 1
                fi
              fi

              # Verify installation
              echo ""
              echo "=== VERIFICATION: Python Installation ==="
              ssh -o StrictHostKeyChecking=accept-new \
                  -o ConnectTimeout="$CONNECTION_TIMEOUT" \
                  -i ~/.ssh/id_rsa \
                  "$SSH_USERNAME@$host" \
                  "python3.11 --version" 2>&1 || echo "⚠️  Python 3.11 verification failed"
              echo "=== END VERIFICATION ==="
            else
              echo "Skipping Python 3.11 installation (only required for SP <= 6)"
              echo ""
              echo "=== VERIFICATION: Python Installation ==="
              echo "SP$SP_VERSION detected - Python 3.11 installation not required"
              echo "=== END VERIFICATION ==="
            fi

            echo "Python 3.11 installation process completed for $host"

          ) > "$log_file" 2>&1 &

          # Track process
          current_pid=$!
          PIDS+=("$current_pid")
          PID_TO_HOST["$current_pid"]="$host"
        done

        echo ""
        echo "All Python 3.11 installation jobs launched. Waiting for completion..."
        echo ""

        # Wait for all jobs to complete and collect results
        success_count=0
        failed_hosts=""

        for pid in "${PIDS[@]}"; do
          host="${PID_TO_HOST[$pid]}"

          if wait "$pid"; then
            echo "✓ Successfully installed Python 3.11 on $host"
            success_count=$((success_count + 1))
          else
            echo "✗ Failed to install Python 3.11 on $host"
            log_file="$LOGS_DIR/python311-install-$host.log"
            if [ -f "$log_file" ]; then
              echo "  Error details (last 30 lines):"
              tail -n 30 "$log_file" | sed 's/^/  /'
            fi
            failed_hosts="$failed_hosts $host"
          fi
        done

        # Display Python version for each host
        echo ""
        echo "================================================"
        echo "Python Installation Status per Machine"
        echo "================================================"
        echo ""

        for host in $HOSTS_FQDN_LIST; do
          # Extract short hostname for display
          short_host=$(echo "$host" | cut -d'.' -f1)
          log_file="$LOGS_DIR/python311-install-$host.log"

          echo "🐍 $short_host:"

          # Read and parse Python version from log file
          if [ -f "$log_file" ]; then
            # Extract the verification section
            verification_output=$(sed -n '/=== VERIFICATION: Python Installation ===/,/=== END VERIFICATION ===/p' "$log_file")

            if [ -n "$verification_output" ]; then
              # Check if installation was skipped (SLES 16 or SP > 6)
              if echo "$verification_output" | grep -q "not required"; then
                reason=$(echo "$verification_output" | grep "not required" | head -1)
                echo "   ℹ️  $reason"
              # Check for Python version
              elif echo "$verification_output" | grep -q "Python 3.11"; then
                python_version=$(echo "$verification_output" | grep "Python 3.11" | head -1)
                echo "   ✓ $python_version"
              else
                echo "   ⚠️  Could not verify Python installation (check logs)"
              fi
            else
              echo "   ⚠️  Verification section not found in log"
            fi
          else
            echo "   ⚠️  Log file not found"
          fi
          echo ""
        done

        # Print summary
        echo "================================================"
        echo "Python 3.11 Installation Summary"
        echo "================================================"
        echo "Total machines: $total_hosts"
        echo "Successfully processed: $success_count"
        echo "Failed: $((total_hosts - success_count))"

        if [ -n "$failed_hosts" ]; then
          echo ""
          echo "Failed hosts:$failed_hosts"
        fi
        echo "================================================"
        echo ""
        echo "Detailed logs saved to: $LOGS_DIR/"

        # Check if any installations failed
        if [ -n "$failed_hosts" ]; then
          echo ""
          echo "Error: Failed to install Python 3.11 on $((total_hosts - success_count)) machine(s)"
          exit 1
        fi

        echo ""
        echo "✓ Python 3.11 installation completed successfully!"
